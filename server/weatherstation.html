<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800, height=480, initial-scale=1, user-scalable=no">
<title>Weather Station</title>
<style>
  @font-face{font-family:'Inter';font-weight:400;font-display:swap;src:url('/assets/inter-400.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:500;font-display:swap;src:url('/assets/inter-500.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:600;font-display:swap;src:url('/assets/inter-600.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:700;font-display:swap;src:url('/assets/inter-700.woff2') format('woff2');}
  :root{--bg:#000;--card:rgba(255,255,255,.09);--card2:rgba(255,255,255,.16);
    --fg:#ffffff;--sec:#a6a6ad;--hair:rgba(255,255,255,.12);--green:#1db954;}
  body.light{--bg:#f2f2f7;--card:rgba(0,0,0,.06);--card2:rgba(0,0,0,.14);
    --fg:#0c0c0e;--sec:#6e6e73;--hair:rgba(0,0,0,.12);--green:#1db954;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:800px;height:480px;overflow:hidden;background:var(--bg);color:var(--fg);
    font-family:'Inter',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    user-select:none;cursor:none;letter-spacing:-.01em;}
  /* ---- PINNED top bar: temp + time, on every view ---- */
  #top{position:fixed;top:0;left:0;width:800px;height:58px;z-index:50;background:var(--bg);
    display:flex;align-items:center;justify-content:space-between;padding:0 26px;
    border-bottom:1px solid var(--hair);}
  #top .twx{display:flex;align-items:baseline;gap:11px;}
  #top #tIcon{font-size:34px;}
  #top #tTemp{font-size:36px;font-weight:700;}
  #top .tdesc{font-size:24px;color:var(--sec);font-weight:500;}
  #top .ttime{display:flex;align-items:baseline;gap:22px;}
  #top .tdate{font-size:24px;color:var(--sec);font-weight:600;}
  #top #tClock{font-size:38px;font-weight:700;font-variant-numeric:tabular-nums;}
  #top #tAp{font-size:22px;color:var(--sec);font-weight:600;margin-left:-8px;}
  body:not(.ovl) #top .ttime{visibility:hidden;}   /* home has the big clock — no duplicate time up top */
  /* ---- HOME ---- */
  #home{position:absolute;inset:0;padding-top:58px;display:flex;flex-direction:column;}
  .hmain{flex:1;min-height:0;display:flex;align-items:center;padding:0 48px;gap:40px;}
  .hclockwrap{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
  #hClock{font-size:156px;font-weight:700;line-height:.9;letter-spacing:-6px;font-variant-numeric:tabular-nums;white-space:nowrap;}
  #hClock .ap{font-size:50px;color:var(--sec);font-weight:600;margin-left:12px;letter-spacing:-1px;}
  #hDate{font-size:34px;font-weight:600;color:var(--sec);margin-top:16px;}
  #hPlace{font-size:24px;font-weight:500;color:var(--sec);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hwx{width:296px;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;text-align:right;}
  .hwx-top{display:flex;align-items:center;gap:10px;}
  .hwx-icon{font-size:66px;line-height:1;}
  .hwx-temp{font-size:104px;font-weight:700;letter-spacing:-4px;line-height:1;}
  .hwx-desc{font-size:32px;font-weight:600;margin-top:6px;}
  .hwx-sub{font-size:24px;color:var(--sec);font-weight:500;margin-top:14px;}
  .hwx-sub b{color:var(--fg);font-weight:600;}
  .hwx-indoor{font-size:38px;font-weight:600;color:var(--fg);margin-top:22px;}
  .hwx-indoor b{color:var(--green);font-weight:700;}
  .hourly{flex:0 0 auto;display:flex;gap:14px;padding:6px 40px 16px;}
  .hcell{flex:1;background:var(--card);border-radius:18px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px;padding:10px 2px;}
  .hcell .ht{font-size:20px;color:var(--sec);font-weight:600;}
  .hcell .hi{font-size:36px;line-height:1;}
  .hcell .hd{font-size:28px;font-weight:700;}
  /* ---- now-playing strip (home) ---- */
  .npbar{flex:0 0 auto;display:flex;align-items:center;gap:16px;margin:0 40px 14px;padding:9px 18px;
    background:var(--card);border-radius:18px;height:58px;}
  .npthumb{width:44px;height:44px;border-radius:10px;flex:0 0 auto;background:var(--card2) center/cover no-repeat;
    display:flex;align-items:center;justify-content:center;font-size:24px;}
  .npmeta{flex:1;min-width:0;}
  .nptitle{font-size:24px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .npsub{font-size:18px;color:var(--sec);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .npbtn{flex:0 0 auto;background:var(--card2);border:none;color:var(--fg);font-size:28px;
    width:64px;height:46px;border-radius:13px;font-family:inherit;}
  /* ---- full-screen views ---- */
  .view{position:fixed;inset:0;padding-top:58px;background:var(--bg);z-index:30;
    opacity:0;visibility:hidden;transition:opacity .22s ease,visibility .22s;}
  .view.show{opacity:1;visibility:visible;}
  .vclose{position:absolute;top:68px;right:24px;z-index:5;font-size:22px;color:var(--sec);
    background:var(--card);border-radius:30px;padding:10px 22px;font-weight:600;}
  /* ---- SPOTIFY view (real Car Thing-style player) ---- */
  #spotify{background:#101012;}
  .spbg{position:absolute;inset:0;background:#101012 center/cover no-repeat;filter:blur(44px) brightness(.5);transform:scale(1.25);z-index:0;transition:background-image .5s ease;}
  .spcontent{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:22px 46px 16px;}
  .sptop{flex:1;min-height:0;display:flex;align-items:center;gap:38px;}
  .spArt{width:228px;height:228px;flex:0 0 auto;border-radius:14px;background:#000 center/cover no-repeat;
    box-shadow:0 14px 44px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:84px;color:rgba(255,255,255,.45);}
  .spInfo{flex:1;min-width:0;}
  .spCtx{font-size:22px;color:rgba(255,255,255,.8);font-weight:600;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spTitle{font-size:54px;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1.04;max-height:2.1em;overflow:hidden;}
  .spArtist{font-size:30px;color:rgba(255,255,255,.78);font-weight:500;margin-top:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spBarWrap{flex:0 0 auto;margin:8px 2px 4px;}
  .spBar{height:7px;background:rgba(255,255,255,.3);border-radius:4px;overflow:hidden;}
  .spFill{height:100%;width:0;background:#fff;border-radius:4px;transition:width .9s linear;}
  .spTimes{display:flex;justify-content:space-between;font-size:16px;color:rgba(255,255,255,.72);font-variant-numeric:tabular-nums;margin-top:7px;}
  .spCtl{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:42px;margin-top:8px;}
  .spBtn{background:none;border:none;color:#fff;font-family:inherit;width:74px;height:74px;
    display:flex;align-items:center;justify-content:center;transition:transform .12s;padding:0;}
  .spBtn:active{transform:scale(.86);}
  .spBtn svg{width:46px;height:46px;}
  .spBtn.big{background:#fff;border-radius:50%;}
  .spBtn.big svg{width:40px;height:40px;color:#000;}
  .spBtn.ic{color:rgba(255,255,255,.78);}
  .spBtn.ic svg{width:34px;height:34px;}
  .spBtn.ic.on{color:var(--green);}
  .spHint{flex:0 0 auto;text-align:center;font-size:18px;color:rgba(255,255,255,.55);font-weight:500;margin-top:12px;min-height:22px;}
  .vclose.light-on-art{color:#fff;background:rgba(255,255,255,.18);}
  /* ---- forecast ---- */
  #forecast .vbody{height:100%;overflow-y:auto;padding:8px 30px 24px;scrollbar-width:none;}
  #forecast .vbody::-webkit-scrollbar{display:none;}
  .drow{display:flex;align-items:center;gap:20px;padding:15px 6px;border-bottom:1px solid var(--hair);}
  .drow .dw{font-size:28px;font-weight:600;width:120px;}
  .drow .di{font-size:40px;width:54px;text-align:center;}
  .drow .dr{margin-left:auto;font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;}
  .drow .dr .lo{color:var(--sec);font-weight:500;margin-left:14px;}
  .vtitle{font-size:30px;font-weight:700;padding:14px 30px 6px;}
  /* ---- settings ---- */
  #settings .vbody{height:100%;overflow-y:auto;padding:6px 30px 24px;scrollbar-width:none;}
  #settings .vbody::-webkit-scrollbar{display:none;}
  .srow{display:flex;flex-direction:column;gap:12px;padding:18px 4px;border-bottom:1px solid var(--hair);}
  .srow .sk{font-size:25px;font-weight:600;}
  .seg{display:flex;flex-wrap:wrap;background:var(--card);border-radius:14px;padding:5px;gap:5px;}
  .seg button{background:none;color:var(--fg);border:none;font-size:23px;font-weight:600;
    padding:14px 30px;border-radius:10px;font-family:inherit;}
  .seg button.on{background:var(--card2);}
  .khi{outline:3px solid var(--green);outline-offset:2px;}
  .bwrap{display:flex;align-items:center;gap:12px;}
  .bbtn{background:var(--card2);border:none;color:var(--fg);font-size:30px;font-weight:700;
    width:64px;height:56px;border-radius:13px;font-family:inherit;flex:0 0 auto;}
  .slider{flex:1;height:40px;background:var(--card);border-radius:20px;overflow:hidden;}
  .bfill{height:100%;width:70%;background:var(--green);border-radius:20px;transition:width .12s ease;}
  .slider.active{outline:3px solid #ff9f0a;outline-offset:3px;}
  .slider.active .bfill{background:#ff9f0a;}
  .about{font-size:20px;color:var(--sec);line-height:1.5;padding:14px 4px;}
  /* ---- location keyboard ---- */
  #loc .vbody{height:100%;overflow-y:auto;padding:6px 24px 16px;scrollbar-width:none;}
  .qbox{font-size:26px;background:var(--card);border-radius:14px;padding:14px 20px;font-weight:500;margin:0 4px 12px;}
  #locResults .res{font-size:24px;padding:15px 16px;border-radius:12px;font-weight:500;}
  #locResults .res:active{background:var(--card2);}
  .krow{display:flex;gap:7px;justify-content:center;margin-bottom:7px;}
  .key{flex:1;background:var(--card);border-radius:11px;font-size:26px;font-weight:600;color:var(--fg);
    padding:15px 0;text-align:center;font-family:inherit;}
  .key:active{background:var(--card2);}
  .key.wide{flex:2.4;}
  button:active,.npbar:active,.npbtn:active,.res:active{transform:scale(.98);}
</style>
</head>
<body>
<div id="top">
  <div class="twx"><span id="tIcon">🌡️</span><span id="tTemp">--°</span><span class="tdesc" id="tDesc"></span></div>
  <div class="ttime"><span class="tdate" id="tDate">—</span><span id="tClock">--:--</span><span id="tAp"></span></div>
</div>

<div id="home">
  <div class="hmain">
    <div class="hclockwrap">
      <div id="hClock">--:--</div>
      <div id="hDate">—</div>
      <div id="hPlace">📍 —</div>
    </div>
    <div class="hwx">
      <div class="hwx-top"><span class="hwx-icon" id="cwIcon">🌡️</span><span class="hwx-temp" id="cwTemp">--°</span></div>
      <div class="hwx-desc" id="cwDesc">Connecting…</div>
      <div class="hwx-sub" id="cwSub"></div>
      <div class="hwx-indoor" id="cwIndoor"></div>
    </div>
  </div>
  <div class="hourly" id="hourly"></div>
  <div class="npbar" id="npbar" onclick="openSpotify()">
    <div class="npthumb" id="npThumb">♫</div>
    <div class="npmeta"><div class="nptitle" id="npbTitle">Spotify</div><div class="npsub" id="npbSub">Tap to open</div></div>
    <button class="npbtn" id="npbPlay" onclick="event.stopPropagation();spCmd('playpause')">▶</button>
  </div>
</div>

<div id="spotify" class="view">
  <div class="spbg" id="spBg"></div>
  <div class="vclose" onclick="closeView('spotify')">Back</div>
  <div class="spcontent">
    <div class="sptop">
      <div class="spArt" id="spArt">♫</div>
      <div class="spInfo">
        <div class="spCtx" id="spCtx"></div>
        <div class="spTitle" id="spTitle">Nothing playing</div>
        <div class="spArtist" id="spArtist"></div>
      </div>
    </div>
    <div class="spBarWrap">
      <div class="spBar"><div class="spFill" id="spFill"></div></div>
      <div class="spTimes"><span id="spPos">0:00</span><span id="spDur">0:00</span></div>
    </div>
    <div class="spCtl">
      <button class="spBtn ic" id="spShuf" onclick="spCmd('shuffle')" aria-label="shuffle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="m4 4 5 5"/></svg></button>
      <button class="spBtn" onclick="spCmd('prev')" aria-label="previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2.2v12H6zM20 6v12l-9.6-6z"/></svg></button>
      <button class="spBtn big" id="spPlay" onclick="spCmd('playpause')" aria-label="play"></button>
      <button class="spBtn" onclick="spCmd('next')" aria-label="next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.8 6H18v12h-2.2zM4 6v12l9.6-6z"/></svg></button>
      <button class="spBtn ic" id="spLike" onclick="spCmd('like')" aria-label="like"></button>
    </div>
    <div class="spHint" id="spHint"></div>
  </div>
</div>

<div id="forecast" class="view">
  <div class="vclose" onclick="closeView('forecast')">Back</div>
  <div class="vtitle">7-Day Forecast</div>
  <div class="vbody" id="fcBody">Loading…</div>
</div>

<div id="loc" class="view">
  <div class="vclose" onclick="closeView('loc')">Back</div>
  <div class="vtitle">Location</div>
  <div class="vbody">
    <div class="qbox" id="qbox">Type a city…</div>
    <div id="locResults"></div>
    <div id="kb"></div>
  </div>
</div>

<div id="settings" class="view">
  <div class="vclose" onclick="closeView('settings')">Back</div>
  <div class="vtitle">Settings</div>
  <div class="vbody">
    <div class="srow"><span class="sk">Units</span>
      <div class="seg"><button onclick="setUnit('C')" data-u="C">°C</button><button onclick="setUnit('F')" data-u="F">°F</button></div></div>
    <div class="srow"><span class="sk">Location</span>
      <div class="seg"><button onclick="openView('loc')">Change city</button></div></div>
    <div class="srow"><span class="sk">Music</span>
      <div class="seg"><button onclick="openSpotify()">Open Spotify</button></div></div>
    <div class="srow"><span class="sk">Appearance</span>
      <div class="seg"><button onclick="setTheme('dark')" data-th="dark">Dark</button><button onclick="setTheme('light')" data-th="light">Light</button></div></div>
    <div class="srow"><span class="sk">Brightness <span id="bpct" style="color:var(--sec);font-weight:400"></span></span>
      <div class="bwrap"><button class="bbtn" id="bAuto" style="width:auto;padding:14px 18px;font-size:24px" onclick="setAuto(!brightAuto)">Auto</button>
        <button class="bbtn" onclick="brightStep(-10)">−</button>
        <div class="slider" id="bbar" onclick="brightTap(event)"><div class="bfill" id="bfill"></div></div>
        <button class="bbtn" onclick="brightStep(10)">+</button></div></div>
    <div class="about" id="about"></div>
  </div>
</div>

<script>
const VERSION="2.0";
const CT="http://127.0.0.1:8091";
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let dispOff=false;
function toggleDisplay(){dispOff=!dispOff;fetch(CT+"/display?on="+(dispOff?0:1)).catch(()=>{});}
// ---- Pi-authoritative clock ----
let srvOffMs=null,tzOffMin=-(new Date().getTimezoneOffset()),haveTime=false;
function setSrvTime(n,tz){if(n){srvOffMs=n-Date.now();haveTime=true;}if(typeof tz==='number')tzOffMin=tz;}
function two(n){return String(n).padStart(2,'0');}
function tick(){
  if(!haveTime){return;}
  const d=new Date(Date.now()+srvOffMs+tzOffMin*60000);
  let h=d.getUTCHours();const ap=h<12?'AM':'PM';const hh=(h%12)||12;const mm=two(d.getUTCMinutes());
  document.getElementById('hClock').innerHTML=hh+':'+mm+'<span class="ap">'+ap+'</span>';
  document.getElementById('tClock').textContent=hh+':'+mm;
  document.getElementById('tAp').textContent=ap;
  const ds=DAYS[d.getUTCDay()]+', '+MON[d.getUTCMonth()]+' '+d.getUTCDate();
  document.getElementById('hDate').textContent=ds;
  document.getElementById('tDate').textContent=ds;
  autoApply();
}
setInterval(tick,1000);
async function syncTime(){try{const t=await (await fetch('/api/time',{cache:'no-store'})).json();setSrvTime(t.now,t.tzoff);tick();}catch(e){}}
syncTime();setInterval(syncTime,30000);
// ---- Weather ----
let unit='C';
async function fetchWeather(){
  try{
    const w=await (await fetch('/api/weather',{cache:'no-store'})).json();
    if(w.now)setSrvTime(w.now,w.tzoff);
    unit=w.unit||'C';markUnit();
    document.getElementById('hPlace').textContent='📍 '+(w.place||'—');
    document.getElementById('tIcon').textContent=w.icon||'🌡️';
    document.getElementById('tTemp').textContent=(w.temp==null?'--':w.temp)+'°';
    document.getElementById('tDesc').textContent=w.temp==null?'':(w.desc||'');
    document.getElementById('cwIcon').textContent=w.icon||'🌡️';
    document.getElementById('cwTemp').textContent=(w.temp==null?'--':w.temp)+'°';
    document.getElementById('cwDesc').textContent=w.temp==null?'Connecting…':(w.desc||'—');
    document.getElementById('cwSub').innerHTML=w.temp==null?'':('H <b>'+w.hi+'°</b>   L <b>'+w.lo+'°</b>');
    document.getElementById('cwIndoor').innerHTML=(w.indoor!=null)?('🏠 Indoor <b>'+w.indoor+'°</b>'):'';
    const H=document.getElementById('hourly');H.innerHTML='';
    (w.hourly||[]).slice(0,7).forEach(h=>{const c=document.createElement('div');c.className='hcell';
      c.innerHTML='<div class="ht">'+hr12(h.t)+'</div><div class="hi">'+h.icon+'</div><div class="hd">'+h.temp+'°</div>';H.appendChild(c);});
    renderForecast(w.daily||[]);
  }catch(e){document.getElementById('cwDesc').textContent='Connecting…';}
}
fetchWeather();setInterval(fetchWeather,180000);
function hr12(t){let h=parseInt((t||'0:0').split(':')[0]);const ap=h<12?'a':'p';h=h%12;if(h===0)h=12;return h+ap;}
function renderForecast(d){const b=document.getElementById('fcBody');if(!d.length){b.innerHTML='<div class="about">No forecast.</div>';return;}
  b.innerHTML=d.map((x,i)=>`<div class="drow"><div class="dw">${i===0?'Today':x.dow}</div><div class="di">${x.icon}</div><div class="dr">${x.hi}°<span class="lo">${x.lo}°</span></div></div>`).join('');}
// ---- Spotify ----
let spState={};
function fmtT(ms){if(!ms||ms<0)ms=0;const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+two(s%60);}
function spOpen(){return document.getElementById('spotify').classList.contains('show');}
function openSpotify(){openView('spotify');renderSpotify(spState);}
function renderNp(s){
  const th=document.getElementById('npThumb'),ti=document.getElementById('npbTitle'),
        su=document.getElementById('npbSub'),pl=document.getElementById('npbPlay');
  if(s&&s.title){
    if(s.art){th.style.backgroundImage=`url('${s.art}')`;th.textContent='';}else{th.style.backgroundImage='none';th.textContent='♫';}
    ti.textContent=s.title;su.textContent=s.artist||'';pl.textContent=s.playing?'⏸':'▶';pl.style.display='';
  }else{th.style.backgroundImage='none';th.textContent='♫';ti.textContent='Spotify';
    su.textContent=(s&&s.available)?'Nothing playing · tap to open':'Tap to open';pl.style.display='none';}
}
const SVG_PLAY='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>';
const SVG_PAUSE='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h3.6v14H7zM13.4 5H17v14h-3.6z"/></svg>';
const SVG_HEART_O='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20.5C5.5 15 3 12.2 3 9.1 3 6.8 4.9 5 7.1 5 8.8 5 10.4 6 12 8c1.6-2 3.2-3 4.9-3C19.1 5 21 6.8 21 9.1c0 3.1-2.5 5.9-9 11.4z"/></svg>';
const SVG_HEART_F='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 20.5C5.5 15 3 12.2 3 9.1 3 6.8 4.9 5 7.1 5 8.8 5 10.4 6 12 8c1.6-2 3.2-3 4.9-3C19.1 5 21 6.8 21 9.1c0 3.1-2.5 5.9-9 11.4z"/></svg>';
let _spArtUrl='';
function renderSpotify(s){s=s||{};
  const art=document.getElementById('spArt'),bg=document.getElementById('spBg');
  const url=s.art||'';
  if(url!==_spArtUrl){_spArtUrl=url;
    if(url){art.style.backgroundImage=`url('${url}')`;art.textContent='';bg.style.backgroundImage=`url('${url}')`;}
    else{art.style.backgroundImage='none';art.textContent='♫';bg.style.backgroundImage='none';}}
  document.getElementById('spCtx').textContent=s.context||'';
  document.getElementById('spTitle').textContent=s.title||(s.available?'Nothing playing':'Spotify not connected');
  document.getElementById('spArtist').textContent=s.artist||'';
  const dur=s.dur_ms||0,pos=s.pos_ms||0;
  document.getElementById('spFill').style.width=(dur?Math.min(100,pos/dur*100):0)+'%';
  document.getElementById('spPos').textContent=fmtT(pos);document.getElementById('spDur').textContent=fmtT(dur);
  document.getElementById('spPlay').innerHTML=s.playing?SVG_PAUSE:SVG_PLAY;
  document.getElementById('spShuf').classList.toggle('on',!!s.shuffle);
  const like=document.getElementById('spLike');like.innerHTML=s.liked?SVG_HEART_F:SVG_HEART_O;like.classList.toggle('on',!!s.liked);
  document.getElementById('spHint').textContent=s.available?(s.title?'':'Nothing playing — start a song on Spotify'):'Spotify not connected';
}
function spCmd(c){fetch('/api/spotify/cmd?c='+c).then(()=>setTimeout(pollSpotify,250)).catch(()=>{});}
function spVol(d){const v=Math.max(0,Math.min(100,(spState&&spState.volume!=null?spState.volume:50)+d));
  if(spState)spState.volume=v;
  fetch('/api/spotify/vol?v='+v).then(()=>setTimeout(pollSpotify,300)).catch(()=>{});}
async function pollSpotify(){
  try{const s=await (await fetch('/api/spotify',{cache:'no-store'})).json();spState=s;renderNp(s);if(spOpen())renderSpotify(s);}
  catch(e){renderNp(null);if(spOpen())renderSpotify({available:false});}}
pollSpotify();setInterval(pollSpotify,1000);
// ---- views + nav ----
const OVL=['spotify','forecast','loc','settings'];
function syncOvl(){document.body.classList.toggle('ovl',!!curOverlay());}
function openView(id){closeAll();document.getElementById(id).classList.add('show');syncOvl();
  if(id==='settings'){markUnit();markTheme();applyBright();markBrightAuto();setSel=0;sliderActive=false;setTimeout(setHi,60);document.getElementById('about').innerHTML='Car Thing Weather Station · v<b>'+VERSION+'</b>';}
  if(id==='loc')openLoc();}
function closeView(id){document.getElementById(id).classList.remove('show');syncOvl();}
function closeAll(){OVL.forEach(id=>document.getElementById(id).classList.remove('show'));syncOvl();}
function curOverlay(){return OVL.find(id=>document.getElementById(id).classList.contains('show'));}
document.addEventListener('keydown',(ev)=>{
  const k=ev.key;
  if(k==='m'||k==='M'){if(!ev.repeat)toggleDisplay();return;}
  if(k==='1'){closeAll();return;}
  if(k==='2'){curOverlay()==='forecast'?closeAll():openView('forecast');return;}
  if(k==='3'){curOverlay()==='spotify'?closeAll():openSpotify();return;}
  if(k==='4'){curOverlay()==='settings'?closeAll():openView('settings');return;}
  const v=curOverlay();
  if(v==='spotify'){
    if(k==='ArrowRight')spCmd('next');else if(k==='ArrowLeft')spCmd('prev');
    else if(k==='ArrowUp')spVol(5);else if(k==='ArrowDown')spVol(-5);
    else if(k==='Enter')spCmd('playpause');else if(k==='Escape'||k==='Backspace')closeView('spotify');return;}
  if(v==='settings'){
    const o=setOpts()[setSel];const onSlider=o&&o.classList.contains('slider');
    if(onSlider&&sliderActive){
      if(k==='ArrowDown'||k==='ArrowRight'){brightStep(5);return;}
      if(k==='ArrowUp'||k==='ArrowLeft'){brightStep(-5);return;}
      if(k==='Enter'||k==='Escape'||k==='Backspace'){sliderActive=false;o.classList.remove('active');return;}
      return;}
    if(k==='ArrowDown'||k==='ArrowRight')setMove(1);
    else if(k==='ArrowUp'||k==='ArrowLeft')setMove(-1);
    else if(k==='Enter'){if(onSlider){sliderActive=true;o.classList.add('active');}else if(o)o.click();}
    else if(k==='Escape'||k==='Backspace')closeView('settings');
    return;}
  if(v){if(k==='Escape'||k==='Backspace')closeView(v);
    else{const b=document.querySelector('#'+v+' .vbody');if(b){if(k==='ArrowDown')b.scrollBy({top:120});else if(k==='ArrowUp')b.scrollBy({top:-120});}}return;}
  if(k==='Enter')openView('forecast');
});
// ---- location ----
let query='';
function openLoc(){query='';document.getElementById('qbox').textContent='Type a city…';document.getElementById('locResults').innerHTML='';buildKb();}
const KB=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
function buildKb(){const kb=document.getElementById('kb');kb.innerHTML='';
  KB.forEach(r=>{const row=document.createElement('div');row.className='krow';
    r.forEach(ch=>{const k=document.createElement('div');k.className='key';k.textContent=ch;k.onclick=()=>{query+=ch;showQ();};row.appendChild(k);});kb.appendChild(row);});
  const row=document.createElement('div');row.className='krow';
  const bs=document.createElement('div');bs.className='key';bs.textContent='⌫';bs.onclick=()=>{query=query.slice(0,-1);showQ();};
  const sp=document.createElement('div');sp.className='key wide';sp.textContent='space';sp.onclick=()=>{query+=' ';showQ();};
  const go=document.createElement('div');go.className='key wide';go.textContent='Search';go.onclick=doSearch;
  row.appendChild(bs);row.appendChild(sp);row.appendChild(go);kb.appendChild(row);}
function showQ(){document.getElementById('qbox').textContent=query||'Type a city…';}
async function doSearch(){if(!query.trim())return;const box=document.getElementById('locResults');box.innerHTML='<div class="res">Searching…</div>';
  try{const res=await (await fetch('/api/geocode?q='+encodeURIComponent(query))).json();box.innerHTML='';
    if(!res.length){box.innerHTML='<div class="res">No matches</div>';return;}
    res.forEach(r=>{const d=document.createElement('div');d.className='res';d.textContent='📍 '+r.place;
      d.onclick=async()=>{await fetch('/api/weather/loc?lat='+r.lat+'&lon='+r.lon+'&place='+encodeURIComponent(r.place));await fetchWeather();closeView('loc');};box.appendChild(d);});
  }catch(e){box.innerHTML='<div class="res">Search failed</div>';}}
async function setUnit(u){unit=u;markUnit();await fetch('/api/weather/unit?u='+u);fetchWeather();}
function markUnit(){document.querySelectorAll('[data-u]').forEach(b=>b.classList.toggle('on',b.dataset.u===unit));}
// ---- settings knob nav: scroll to the slider, PRESS to activate (turns orange), turn to dim/brighten ----
let setSel=0,sliderActive=false;
function setOpts(){return Array.from(document.querySelectorAll('#settings .vbody button, #settings .vbody .slider'));}
function setHi(){const o=setOpts();o.forEach((b,i)=>b.classList.toggle('khi',i===setSel));const c=o[setSel];if(c)c.scrollIntoView({block:'nearest',behavior:'smooth'});}
function setMove(d){const o=setOpts();if(!o.length)return;sliderActive=false;
  document.querySelectorAll('#settings .slider.active').forEach(s=>s.classList.remove('active'));
  setSel=(setSel+d+o.length)%o.length;setHi();}
// ---- theme + brightness ----
let brightPct=parseInt(localStorage.getItem('brightPct')||'80')||80,brightAuto=localStorage.getItem('brightAuto')==='1',_lastAuto=-1;
function setTheme(t){document.body.classList.toggle('light',t==='light');localStorage.setItem('theme',t);markTheme();}
function markTheme(){const th=document.body.classList.contains('light')?'light':'dark';document.querySelectorAll('[data-th]').forEach(b=>b.classList.toggle('on',b.dataset.th===th));}
function applyBright(){brightPct=Math.max(10,Math.min(100,brightPct));
  document.getElementById('bfill').style.width=brightPct+'%';
  const p=document.getElementById('bpct');if(p)p.textContent=brightPct+(brightAuto?'% · auto':'%');
  localStorage.setItem('brightPct',brightPct);fetch(CT+'/bright?level='+brightPct).catch(()=>{});}
function manualBright(v){brightAuto=false;localStorage.setItem('brightAuto','0');markBrightAuto();brightPct=v;applyBright();}
function brightStep(d){manualBright(brightPct+d);}
function brightTap(e){const r=document.getElementById('bbar').getBoundingClientRect();manualBright(Math.round((e.clientX-r.left)/r.width*100));}
function autoLevel(h){if(h>=8&&h<19)return 100;if(h>=6&&h<8)return 75;if(h>=19&&h<22)return 55;return 25;}
function autoApply(f){if(!brightAuto||!haveTime)return;const lvl=autoLevel(new Date(Date.now()+srvOffMs+tzOffMin*60000).getUTCHours());
  if(f||lvl!==_lastAuto){_lastAuto=lvl;brightPct=lvl;applyBright();}}
function setAuto(on){brightAuto=on;localStorage.setItem('brightAuto',on?'1':'0');markBrightAuto();if(on)autoApply(true);}
function markBrightAuto(){const b=document.getElementById('bAuto');if(b)b.classList.toggle('on',brightAuto);}
(function(){if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
  setTimeout(()=>{markBrightAuto();if(brightAuto)autoApply(true);else applyBright();},1500);})();
</script>
