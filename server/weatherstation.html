<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800, height=480, initial-scale=1, user-scalable=no">
<title>Weather Station</title>
<style>
  @font-face{font-family:'Inter';font-weight:400;font-display:swap;src:url('/assets/inter-400.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:500;font-display:swap;src:url('/assets/inter-500.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:600;font-display:swap;src:url('/assets/inter-600.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-weight:700;font-display:swap;src:url('/assets/inter-700.woff2') format('woff2');}
  :root{--bg:#000;--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.14);
    --fg:#f5f5f7;--sec:#9a9aa0;--hair:rgba(255,255,255,.10);--green:#30d158;--ts:1;}
  body.light{--bg:#f2f2f7;--card:rgba(0,0,0,.05);--card2:rgba(0,0,0,.12);
    --fg:#1c1c1e;--sec:#6e6e73;--hair:rgba(0,0,0,.10);--green:#28a745;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:800px;height:480px;overflow:hidden;background:var(--bg);color:var(--fg);
    font-family:'Inter',-apple-system,system-ui,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;user-select:none;cursor:none;letter-spacing:-.01em;}
  #app{display:grid;grid-template-rows:48px 232px 96px 62px;width:800px;height:480px;}
  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
  .place{display:flex;align-items:center;gap:7px;font-size:calc(21px*var(--ts));font-weight:600;
    max-width:480px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tr{color:var(--fg);font-size:calc(21px*var(--ts));font-weight:600;}
  /* hero: clock | current conditions */
  .hero{display:flex;align-items:center;gap:10px;padding:0 28px;}
  .clockwrap{flex:1;display:flex;flex-direction:column;justify-content:center;}
  #clock{font-size:calc(132px*min(var(--ts),1.2));font-weight:700;line-height:.9;
    letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
  #clock .ap{font-size:calc(44px*min(var(--ts),1.2));font-weight:600;color:var(--sec);margin-left:10px;letter-spacing:-.02em;}
  #dateBig{font-size:calc(32px*min(var(--ts),1.2));font-weight:600;color:var(--sec);margin-top:16px;}
  .cond{width:330px;display:flex;flex-direction:column;align-items:flex-end;text-align:right;}
  .cond .top2{display:flex;align-items:center;gap:10px;}
  .cond .ic{font-size:calc(76px*min(var(--ts),1.15));line-height:1;}
  .cond .tmp{font-size:calc(104px*min(var(--ts),1.15));font-weight:700;letter-spacing:-.03em;line-height:1;}
  .cond .desc{font-size:calc(30px*min(var(--ts),1.2));font-weight:600;margin-top:8px;}
  .cond .sub{font-size:calc(22px*min(var(--ts),1.2));color:var(--sec);font-weight:500;margin-top:12px;line-height:1.55;}
  .cond .sub b{color:var(--fg);font-weight:600;}
  /* hourly strip */
  .hourly{display:flex;gap:9px;padding:2px 24px;align-items:stretch;}
  .hcell{flex:1;background:var(--card);border-radius:16px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;padding:6px 2px;}
  .hcell .ht{font-size:calc(18px*var(--ts));color:var(--sec);font-weight:600;}
  .hcell .hi{font-size:calc(34px*var(--ts));line-height:1;}
  .hcell .hd{font-size:calc(26px*var(--ts));font-weight:700;}
  /* persistent Spotify bar (always visible on home) */
  .npbar{display:flex;align-items:center;gap:14px;margin:0 24px 10px;padding:8px 14px;
    background:var(--card);border-radius:18px;height:54px;}
  .npthumb{width:38px;height:38px;border-radius:9px;flex:0 0 auto;
    background:var(--card2) center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .npmeta{flex:1;min-width:0;}
  .nptitle{font-size:calc(20px*var(--ts));font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .npsub{font-size:calc(15px*var(--ts));color:var(--sec);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .npplay{flex:0 0 auto;background:var(--card2);border:none;color:var(--fg);font-size:24px;
    width:54px;height:42px;border-radius:12px;font-family:inherit;}
  .npplay:active{transform:scale(.94);}
  /* generic full-screen view */
  .view{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:15;
    opacity:0;visibility:hidden;transform:scale(1.015);transition:opacity .26s ease,transform .26s ease,visibility .26s;}
  .view.show{opacity:1;visibility:visible;transform:none;}
  .view .vhead{display:flex;align-items:center;gap:14px;padding:18px 26px 12px;}
  .view .vtitle{font-size:calc(30px*var(--ts));font-weight:700;letter-spacing:-.02em;}
  .view .vclose{margin-left:auto;font-size:19px;color:var(--sec);background:var(--card);border-radius:30px;padding:11px 22px;font-weight:500;}
  .view .vbody{flex:1;overflow-y:auto;padding:4px 24px 24px;scroll-behavior:smooth;scrollbar-width:none;}
  .view .vbody::-webkit-scrollbar{display:none;}
  /* forecast */
  .drow{display:flex;align-items:center;gap:18px;padding:16px 8px;border-bottom:1px solid var(--hair);}
  .drow .dw{font-size:calc(24px*var(--ts));font-weight:600;width:74px;}
  .drow .di{font-size:calc(32px*var(--ts));width:46px;text-align:center;}
  .drow .dr{margin-left:auto;font-size:calc(24px*var(--ts));font-weight:700;font-variant-numeric:tabular-nums;}
  .drow .dr .lo{color:var(--sec);font-weight:500;margin-left:12px;}
  /* spotify view */
  #spotify .sp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:6px 24px 24px;text-align:center;}
  .spArt{width:188px;height:188px;border-radius:20px;background:#1c1c1e center/cover no-repeat;box-shadow:0 10px 30px rgba(0,0,0,.5);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:64px;}
  .spTitle{font-size:calc(28px*min(var(--ts),1.4));font-weight:700;letter-spacing:-.02em;max-width:92%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spArtist{font-size:calc(20px*min(var(--ts),1.3));color:var(--sec);font-weight:500;margin-top:-6px;}
  .spBar{width:100%;max-width:430px;height:6px;background:var(--card);border-radius:3px;overflow:hidden;}
  .spFill{height:100%;width:0;background:var(--green);border-radius:3px;transition:width .9s linear;}
  .spTimes{width:100%;max-width:430px;display:flex;justify-content:space-between;font-size:14px;color:var(--sec);font-variant-numeric:tabular-nums;margin-top:-6px;}
  .spCtl{display:flex;align-items:center;gap:28px;margin-top:4px;}
  .spVol{display:flex;align-items:center;gap:12px;width:100%;max-width:330px;justify-content:center;}
  .spBtn{background:var(--card);border:none;color:var(--fg);font-size:28px;width:66px;height:58px;border-radius:14px;font-family:inherit;transition:transform .14s ease,background .2s ease;}
  .spBtn:active{transform:scale(.94);background:var(--card2);}
  .spBtn.big{font-size:32px;width:82px;height:66px;background:var(--green);color:#000;}
  .spBtn.sm{font-size:22px;width:54px;height:46px;}
  /* settings */
  .srow{display:flex;flex-direction:column;align-items:flex-start;gap:10px;padding:18px 6px;border-bottom:1px solid var(--hair);}
  .srow .sk{font-size:calc(21px*var(--ts));font-weight:600;}
  .seg2{display:flex;flex-wrap:wrap;background:var(--card);border-radius:12px;padding:4px;gap:4px;}
  .seg2 button{background:transparent;color:var(--fg);border:none;font-size:calc(19px*var(--ts));font-weight:600;padding:14px 26px;border-radius:9px;font-family:inherit;}
  .seg2 button.on{background:var(--card2);}
  .khi{outline:3px solid var(--green);outline-offset:1px;}
  .bwrap{display:flex;align-items:center;gap:10px;width:100%;}
  .slider{flex:1;height:34px;background:var(--card);border-radius:17px;overflow:hidden;}
  .bfill{height:100%;background:var(--green);border-radius:17px;transition:width .12s ease;}
  .slider.active{outline:3px solid #ff9f0a;outline-offset:2px;}
  .slider.active .bfill{background:#ff9f0a;}
  .bbtn{background:var(--card2);border:none;color:var(--fg);font-size:calc(26px*var(--ts));font-weight:700;width:60px;height:50px;border-radius:12px;font-family:inherit;flex:0 0 auto;}
  .about{font-size:18px;color:var(--sec);line-height:1.6;padding:12px 6px;}
  /* location search keyboard */
  #loc .qbox{font-size:23px;background:var(--card);border-radius:13px;padding:13px 18px;color:var(--fg);font-weight:500;margin:0 6px 10px;}
  #locResults{margin:0 6px 8px;}
  #locResults .res{font-size:21px;padding:14px 16px;border-radius:12px;color:var(--fg);font-weight:500;}
  #locResults .res:active{background:var(--card2);}
  #kb{display:flex;flex-direction:column;gap:7px;padding:0 6px;}
  .krow{display:flex;gap:7px;justify-content:center;}
  .key{flex:1;background:var(--card);border-radius:11px;font-size:24px;font-weight:600;color:var(--fg);padding:14px 0;text-align:center;font-family:inherit;}
  .key:active{background:var(--card2);}
  .key.wide{flex:2.4;}
  .seg2 button:active,.vclose:active,.bbtn:active,.npbar:active{transform:scale(.98);}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="place" id="place">📍 —</div>
    <div class="tr" id="dateTop">—</div>
  </div>
  <div class="hero">
    <div class="clockwrap">
      <div id="clock">--:--<span class="ap"></span></div>
      <div id="dateBig">—</div>
    </div>
    <div class="cond" id="cond" onclick="openView('forecast')">
      <div class="top2"><span class="ic" id="cIcon">🌡️</span><span class="tmp" id="cTemp">--°</span></div>
      <div class="desc" id="cDesc">Connecting…</div>
      <div class="sub" id="cSub"></div>
    </div>
  </div>
  <div class="hourly" id="hourly"></div>
  <div class="npbar" id="npbar" onclick="openSpotify()">
    <div class="npthumb" id="npThumb">♫</div>
    <div class="npmeta"><div class="nptitle" id="npbTitle">Spotify</div><div class="npsub" id="npbSub">Tap to open</div></div>
    <button class="npplay" id="npbPlay" onclick="event.stopPropagation();spCmd('playpause')">▶</button>
  </div>
</div>

<div id="forecast" class="view">
  <div class="vhead"><div class="vtitle">7-Day Forecast</div><div class="vclose" onclick="closeView('forecast')">Back</div></div>
  <div class="vbody" id="fcBody">Loading…</div>
</div>

<div id="spotify" class="view">
  <div class="vhead"><div class="vtitle">Spotify</div><div class="vclose" onclick="closeView('spotify')">Back</div></div>
  <div class="sp">
    <div class="spArt" id="spArt">♫</div>
    <div class="spTitle" id="spTitle">Spotify not connected</div>
    <div class="spArtist" id="spArtist"></div>
    <div class="spBar"><div class="spFill" id="spFill"></div></div>
    <div class="spTimes"><span id="spPos">0:00</span><span id="spDur">0:00</span></div>
    <div class="spCtl">
      <button class="spBtn" onclick="spCmd('prev')">⏮</button>
      <button class="spBtn big" id="spPlay" onclick="spCmd('playpause')">▶</button>
      <button class="spBtn" onclick="spCmd('next')">⏭</button>
    </div>
    <div class="spVol"><button class="spBtn sm" onclick="spVol(-10)">🔉</button><div class="slider" style="max-width:240px;height:34px"><div class="bfill" id="spVolFill"></div></div><button class="spBtn sm" onclick="spVol(10)">🔊</button></div>
    <div class="about" id="spHint" style="text-align:center;padding-top:0"></div>
  </div>
</div>

<div id="loc" class="view">
  <div class="vhead"><div class="vtitle">Location</div><div class="vclose" onclick="closeView('loc')">Back</div></div>
  <div class="vbody">
    <div class="qbox" id="qbox">Type a city…</div>
    <div id="locResults"></div>
    <div id="kb"></div>
  </div>
</div>

<div id="settings" class="view">
  <div class="vhead"><div class="vtitle">Settings</div><div class="vclose" onclick="closeView('settings')">Back</div></div>
  <div class="vbody">
    <div class="srow"><span class="sk">Units</span>
      <div class="seg2"><button onclick="setUnit('C')" data-u="C">°C</button><button onclick="setUnit('F')" data-u="F">°F</button></div></div>
    <div class="srow"><span class="sk">Location</span>
      <div class="seg2"><button onclick="openView('loc')">Change city</button></div></div>
    <div class="srow"><span class="sk">Music</span>
      <div class="seg2"><button onclick="openSpotify()">Open Spotify</button></div></div>
    <div class="srow"><span class="sk">Text size</span>
      <div class="seg2"><button onclick="setTs(0.9)" data-ts="0.9">Small</button><button onclick="setTs(1)" data-ts="1">Medium</button><button onclick="setTs(1.15)" data-ts="1.15">Large</button><button onclick="setTs(1.35)" data-ts="1.35">XL</button></div></div>
    <div class="srow"><span class="sk">Appearance</span>
      <div class="seg2"><button onclick="setTheme('dark')" data-th="dark">Dark</button><button onclick="setTheme('light')" data-th="light">Light</button></div></div>
    <div class="srow"><span class="sk">Brightness <span id="bpct" style="color:var(--sec);font-weight:400"></span></span>
      <div class="bwrap"><button class="bbtn" id="bAuto" style="width:auto;padding:14px 16px" onclick="setAuto(!brightAuto)">Auto</button><button class="bbtn" onclick="brightStep(-10)">−</button>
        <div class="slider" id="bbar" onclick="brightTap(event)"><div class="bfill" id="bfill"></div></div>
        <button class="bbtn" onclick="brightStep(10)">+</button></div></div>
    <div class="about" id="about"></div>
  </div>
</div>

<script>
const VERSION="1.1";
const CT="http://127.0.0.1:8091";   // Car Thing-side brightness/display control server
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let dispOff=false;
function toggleDisplay(){dispOff=!dispOff;fetch(CT+"/display?on="+(dispOff?0:1)).catch(()=>{});}
// ---- Pi-authoritative clock (Car Thing has no RTC/NTP — never trust the browser clock) ----
let srvOffMs=null,tzOffMin=-(new Date().getTimezoneOffset()),haveTime=false;
function setSrvTime(nowMs,tzoff){if(nowMs){srvOffMs=nowMs-Date.now();haveTime=true;}if(typeof tzoff==='number')tzOffMin=tzoff;}
function tick(){
  if(!haveTime){document.getElementById('clock').innerHTML='--:--';document.getElementById('dateBig').textContent='Syncing…';return;}
  const base=Date.now()+srvOffMs+tzOffMin*60000;
  const d=new Date(base);
  let h=d.getUTCHours();const ap=h<12?'AM':'PM';const hh=(h%12)||12;
  document.getElementById('clock').innerHTML=hh+':'+String(d.getUTCMinutes()).padStart(2,'0')+'<span class="ap">'+ap+'</span>';
  const ds=DAYS[d.getUTCDay()]+', '+MON[d.getUTCMonth()]+' '+d.getUTCDate();
  document.getElementById('dateBig').textContent=ds;document.getElementById('dateTop').textContent=ds;
  autoApply();
}
setInterval(tick,1000);tick();
async function syncTime(){try{const t=await (await fetch('/api/time',{cache:'no-store'})).json();setSrvTime(t.now,t.tzoff);tick();}catch(e){}}
syncTime();setInterval(syncTime,30000);

// ---- Weather ----
let unit='C';
async function fetchWeather(){
  try{
    const w=await (await fetch('/api/weather',{cache:'no-store'})).json();
    if(w.now)setSrvTime(w.now,w.tzoff);
    unit=w.unit||'C';markUnit();
    document.getElementById('place').textContent='📍 '+(w.place||'—');
    document.getElementById('cIcon').textContent=w.icon||'🌡️';
    document.getElementById('cTemp').textContent=(w.temp==null?'--':w.temp)+'°';
    document.getElementById('cDesc').textContent=w.temp==null?'Weather unavailable':(w.desc||'—');
    document.getElementById('cSub').innerHTML = w.temp==null ? '' :
      ('Feels <b>'+w.feels+'°</b> · H:<b>'+w.hi+'°</b> L:<b>'+w.lo+'°</b><br>💧 '+w.humidity+'%  ·  💨 '+w.wind+' '+w.wind_unit);
    const H=document.getElementById('hourly');H.innerHTML='';
    (w.hourly||[]).slice(0,7).forEach(h=>{const c=document.createElement('div');c.className='hcell';
      c.innerHTML='<div class="ht">'+hr12(h.t)+'</div><div class="hi">'+h.icon+'</div><div class="hd">'+h.temp+'°</div>';H.appendChild(c);});
    renderForecast(w.daily||[]);
  }catch(e){document.getElementById('cDesc').textContent='Connecting…';}
}
fetchWeather();setInterval(fetchWeather,180000);
function hr12(t){let h=parseInt((t||'0:0').split(':')[0]);const ap=h<12?'a':'p';h=h%12;if(h===0)h=12;return h+ap;}
function renderForecast(daily){
  const b=document.getElementById('fcBody');if(!daily.length){b.innerHTML='<div class="about">No forecast.</div>';return;}
  b.innerHTML=daily.map((d,i)=>`<div class="drow"><div class="dw">${i===0?'Today':d.dow}</div><div class="di">${d.icon}</div><div class="dr">${d.hi}°<span class="lo">${d.lo}°</span></div></div>`).join('');
}

// ---- Spotify (always-visible bar + full view; via /api/spotify*) ----
let spState={};
function fmtT(ms){if(!ms||ms<0)ms=0;const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function spOpen(){return document.getElementById('spotify').classList.contains('show');}
function openSpotify(){openView('spotify');renderSpotify(spState);}
function renderNp(s){
  const thumb=document.getElementById('npThumb'),title=document.getElementById('npbTitle'),
        sub=document.getElementById('npbSub'),play=document.getElementById('npbPlay');
  if(s&&s.title){
    if(s.art){thumb.style.backgroundImage=`url('${s.art}')`;thumb.textContent='';}else{thumb.style.backgroundImage='none';thumb.textContent='♫';}
    title.textContent=s.title;sub.textContent=s.artist||'';play.textContent=s.playing?'⏸':'▶';play.style.display='';
  }else{
    thumb.style.backgroundImage='none';thumb.textContent='♫';title.textContent='Spotify';
    sub.textContent=(s&&s.available)?'Nothing playing · tap to open':'Tap to open';play.style.display='none';
  }
}
function renderSpotify(s){s=s||{};
  const art=document.getElementById('spArt');
  if(s.art){art.style.backgroundImage=`url('${s.art}')`;art.textContent='';}else{art.style.backgroundImage='none';art.textContent='♫';}
  document.getElementById('spTitle').textContent=s.title||(s.available?'Nothing playing':'Spotify not connected');
  document.getElementById('spArtist').textContent=s.artist||'';
  const dur=s.dur_ms||0,pos=s.pos_ms||0;
  document.getElementById('spFill').style.width=(dur?Math.min(100,pos/dur*100):0)+'%';
  document.getElementById('spPos').textContent=fmtT(pos);document.getElementById('spDur').textContent=fmtT(dur);
  document.getElementById('spPlay').textContent=s.playing?'⏸':'▶';
  const vf=document.getElementById('spVolFill');if(vf)vf.style.width=(s.volume==null?50:s.volume)+'%';
  const hint=document.getElementById('spHint');if(hint)hint.textContent=s.available?'':'Open Spotify on your phone/Alexa and pick a device to play.';
}
function spCmd(c){fetch('/api/spotify/cmd?c='+c).then(()=>setTimeout(pollSpotify,200)).catch(()=>{});}
function spVol(d){const v=Math.max(0,Math.min(100,(spState&&spState.volume!=null?spState.volume:50)+d));
  if(spState)spState.volume=v;const vf=document.getElementById('spVolFill');if(vf)vf.style.width=v+'%';
  fetch('/api/spotify/vol?v='+v).then(()=>setTimeout(pollSpotify,300)).catch(()=>{});}
async function pollSpotify(){
  try{const s=await (await fetch('/api/spotify',{cache:'no-store'})).json();spState=s;renderNp(s);if(spOpen())renderSpotify(s);}
  catch(e){renderNp(null);if(spOpen())renderSpotify({available:false});}}
pollSpotify();setInterval(pollSpotify,1000);

// ---- Views + nav ----
const OVL=['forecast','spotify','loc','settings'];
function openView(id){closeAll();document.getElementById(id).classList.add('show');if(id==='settings'){markUnit();markSettings();applyBright();markBrightAuto();setSel=0;sliderActive=false;setTimeout(setHi,60);document.getElementById('about').innerHTML='Car Thing Weather Station · v<b>'+VERSION+'</b>';}if(id==='loc')openLoc();}
function closeView(id){document.getElementById(id).classList.remove('show');}
function closeAll(){OVL.forEach(id=>document.getElementById(id).classList.remove('show'));}
function curOverlay(){return OVL.find(id=>document.getElementById(id).classList.contains('show'));}
function btnNav(k){const cur=curOverlay();
  if(k==='1'){closeAll();return true;}
  if(k==='2'){cur==='forecast'?closeAll():openView('forecast');return true;}
  if(k==='3'){cur==='spotify'?closeAll():openSpotify();return true;}
  if(k==='4'){cur==='settings'?closeAll():openView('settings');return true;}
  return false;}
document.addEventListener('keydown',(ev)=>{
  const k=ev.key;
  if(k==='m'||k==='M'){if(!ev.repeat)toggleDisplay();return;}
  if(btnNav(k))return;
  const v=curOverlay();
  if(v==='spotify'){
    if(k==='ArrowRight')spCmd('next');else if(k==='ArrowLeft')spCmd('prev');
    else if(k==='ArrowDown')spVol(-5);else if(k==='ArrowUp')spVol(5);
    else if(k==='Enter')spCmd('playpause');else if(k==='Escape'||k==='Backspace')closeView('spotify');return;}
  if(v==='settings'){
    const o=setOpts()[setSel];const onSlider=o&&o.classList.contains('slider');
    if(onSlider&&sliderActive){
      if(k==='ArrowDown'||k==='ArrowRight'){brightStep(5);return;}
      if(k==='ArrowUp'||k==='ArrowLeft'){brightStep(-5);return;}
      if(k==='Enter'||k==='Escape'||k==='Backspace'){sliderActive=false;o.classList.remove('active');return;}return;}
    if(k==='ArrowDown'||k==='ArrowRight')setMove(1);else if(k==='ArrowUp'||k==='ArrowLeft')setMove(-1);
    else if(k==='Enter'){if(onSlider){sliderActive=true;o.classList.add('active');}else if(o)o.click();}
    else if(k==='Escape'||k==='Backspace')closeView('settings');return;}
  if(v){
    const body=document.querySelector('#'+v+' .vbody');
    if(k==='ArrowDown'||k==='ArrowRight'){if(body)body.scrollBy({top:120,behavior:'smooth'});}
    else if(k==='ArrowUp'||k==='ArrowLeft'){if(body)body.scrollBy({top:-120,behavior:'smooth'});}
    else if(k==='Escape'||k==='Backspace')closeView(v);return;}
  if(k==='Enter')openSpotify();
  else if(k==='ArrowRight'||k==='ArrowDown')openView('forecast');
});

// ---- Location search ----
let query='';
function openLoc(){query='';document.getElementById('qbox').textContent='Type a city…';document.getElementById('locResults').innerHTML='';buildKb();}
const KB=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
function buildKb(){const kb=document.getElementById('kb');kb.innerHTML='';
  KB.forEach(row=>{const r=document.createElement('div');r.className='krow';
    row.forEach(ch=>{const key=document.createElement('div');key.className='key';key.textContent=ch;
      key.onclick=()=>{query+=ch;showQuery();};r.appendChild(key);});kb.appendChild(r);});
  const r=document.createElement('div');r.className='krow';
  const bs=document.createElement('div');bs.className='key';bs.textContent='⌫';bs.onclick=()=>{query=query.slice(0,-1);showQuery();};
  const sp=document.createElement('div');sp.className='key wide';sp.textContent='space';sp.onclick=()=>{query+=' ';showQuery();};
  const go=document.createElement('div');go.className='key wide';go.textContent='Search';go.onclick=doSearch;
  r.appendChild(bs);r.appendChild(sp);r.appendChild(go);kb.appendChild(r);}
function showQuery(){document.getElementById('qbox').textContent=query||'Type a city…';}
async function doSearch(){if(!query.trim())return;
  const box=document.getElementById('locResults');box.innerHTML='<div class="res">Searching…</div>';
  try{const res=await (await fetch('/api/geocode?q='+encodeURIComponent(query))).json();box.innerHTML='';
    if(!res.length){box.innerHTML='<div class="res">No matches</div>';return;}
    res.forEach(r=>{const d=document.createElement('div');d.className='res';d.textContent='📍 '+r.place;
      d.onclick=async()=>{await fetch('/api/weather/loc?lat='+r.lat+'&lon='+r.lon+'&place='+encodeURIComponent(r.place));
        await fetchWeather();closeView('loc');};box.appendChild(d);});
  }catch(e){box.innerHTML='<div class="res">Search failed</div>';}}
async function setUnit(u){unit=u;markUnit();await fetch('/api/weather/unit?u='+u);fetchWeather();}
function markUnit(){document.querySelectorAll('[data-u]').forEach(b=>b.classList.toggle('on',b.dataset.u===unit));}

// ---- Settings: text size / theme / brightness ----
let setSel=0,sliderActive=false;
let brightPct=parseInt(localStorage.getItem('brightPct')||'70')||70,brightAuto=localStorage.getItem('brightAuto')==='1',_lastAutoLvl=-1;
function setOpts(){return Array.from(document.querySelectorAll('#settings .vbody button, #settings .vbody .slider'));}
function setHi(){const o=setOpts();o.forEach((b,i)=>b.classList.toggle('khi',i===setSel));const c=o[setSel];if(c)c.scrollIntoView({block:'nearest',behavior:'smooth'});}
function setMove(d){const o=setOpts();if(!o.length)return;sliderActive=false;
  document.querySelectorAll('#settings .slider.active').forEach(s=>s.classList.remove('active'));
  setSel=(setSel+d+o.length)%o.length;setHi();}
function setTs(v){document.documentElement.style.setProperty('--ts',v);localStorage.setItem('ts',v);markSettings();}
function setTheme(t){document.body.classList.toggle('light',t==='light');localStorage.setItem('theme',t);markSettings();}
function markSettings(){const ts=localStorage.getItem('ts')||'1',th=document.body.classList.contains('light')?'light':'dark';
  document.querySelectorAll('[data-ts]').forEach(b=>b.classList.toggle('on',b.dataset.ts===ts));
  document.querySelectorAll('[data-th]').forEach(b=>b.classList.toggle('on',b.dataset.th===th));}
function applyBright(){brightPct=Math.max(10,Math.min(100,brightPct));
  const f=document.getElementById('bfill');if(f)f.style.width=brightPct+'%';
  const p=document.getElementById('bpct');if(p)p.textContent=brightPct+(brightAuto?'% · auto':'%');
  localStorage.setItem('brightPct',brightPct);fetch(CT+'/bright?level='+brightPct).catch(()=>{});}
function manualBright(v){brightAuto=false;localStorage.setItem('brightAuto','0');markBrightAuto();brightPct=v;applyBright();}
function brightStep(d){manualBright(brightPct+d);}
function brightTap(e){const r=document.getElementById('bbar').getBoundingClientRect();manualBright(Math.round((e.clientX-r.left)/r.width*100));}
function autoLevel(h){if(h>=8&&h<19)return 100;if(h>=6&&h<8)return 75;if(h>=19&&h<22)return 55;return 20;}
function autoApply(force){if(!brightAuto||!haveTime)return;
  const lvl=autoLevel(new Date(Date.now()+srvOffMs+tzOffMin*60000).getUTCHours());
  if(force||lvl!==_lastAutoLvl){_lastAutoLvl=lvl;brightPct=lvl;applyBright();}}
function setAuto(on){brightAuto=on;localStorage.setItem('brightAuto',on?'1':'0');markBrightAuto();if(on)autoApply(true);}
function markBrightAuto(){const b=document.getElementById('bAuto');if(b)b.classList.toggle('on',brightAuto);}
(function applySaved(){const ts=localStorage.getItem('ts');if(ts)document.documentElement.style.setProperty('--ts',ts);
  if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
  setTimeout(()=>{markBrightAuto();if(brightAuto)autoApply(true);else applyBright();},1500);})();
</script>
